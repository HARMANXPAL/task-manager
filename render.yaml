# render.yaml — defines both services so Render can deploy from one repo
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: taskflow-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # Set these manually in the Render dashboard (never commit secrets):
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ENCRYPTION_KEY
        sync: false
      - key: CLIENT_URL
        sync: false   # set to your frontend Render URL

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - type: web
    name: taskflow-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      # SPA fallback — React Router handles all paths
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set to your backend Render URL, e.g. https://taskflow-api.onrender.com/api
      - key: VITE_API_URL
        sync: false
